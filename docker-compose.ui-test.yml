services:
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - weather-network-ui-test

  frontend:
    build:
      context: ./frontend
      args:
        VITE_WEATHER_SERVER: http://backend:5000
    depends_on:
      - backend
    networks:
      - weather-network-ui-test

  backend:
    build:
      context: ./backend
    environment:
      - OW_API_KEY=${OW_API_KEY}
      - VC_API_KEY=${VC_API_KEY}
      - DB_USER=weather_user
      - DB_PASSWORD=weather_password
      - DB_NAME=weather_db
      - DB_HOST=db
      - DB_PORT=5432
    depends_on:
      db:
        condition: service_healthy
    networks:
      - weather-network-ui-test

  db:
    image: postgres:17-alpine
    container_name: weather_db_test
    restart: always
    environment:
      - POSTGRES_USER=weather_user
      - POSTGRES_PASSWORD=weather_password
      - POSTGRES_DB=weather_db
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    networks:
      - weather-network-ui-test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U weather_user -d weather_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  ui_test:
    build:
      context: ./ui_test
      dockerfile: Dockerfile
    environment:
      - FRONTEND_URL=http://nginx:80
      - CI=true
      - GITHUB_ACTIONS=true
    depends_on:
      - nginx
      - backend
    networks:
      - weather-network-ui-test
    cap_add:
      - SYS_ADMIN
    security_opt:
      - seccomp:unconfined

networks:
  weather-network-ui-test:
    driver: bridge

volumes:
  postgres_test_data: