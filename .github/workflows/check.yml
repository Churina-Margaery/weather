name: UI Tests with Real Backend and Allure Report

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  unit-test:
    runs-on: ubuntu-latest
    name: Unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Running unit-tests
        working-directory: ./frontend
        run: |
          npm install
          npm run test

  test:
    runs-on: ubuntu-latest
    name: UI-tests with real backend and Report
    needs: unit-test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          OW_API_KEY=${{ secrets.OW_API_KEY }}
          VC_API_KEY=${{ secrets.VC_API_KEY }}
          DB_USER=test_user
          DB_PASSWORD=test_password
          DB_NAME=test_db
          EOF
          
          echo "========== .env contents (keys hidden) =========="
          cat .env | sed 's/\(API_KEY=\)[^:]*/\1***/'

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.ui-test.yml --env-file .env up -d --build
          
          echo "Waiting for services to start..."
          timeout 60 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost)" != "200" ]]; do sleep 2; done'
          echo "Frontend is up!"
          sleep 15

      - name: Debug - check running containers
        run: |
          echo "========== RUNNING CONTAINERS =========="
          docker compose -f docker-compose.ui-test.yml ps

      - name: Debug backend environment
        run: |
          echo "========== BACKEND ENVIRONMENT VARIABLES =========="
          docker compose -f docker-compose.ui-test.yml exec backend env | grep -E "OW_API_KEY|VC_API_KEY|DB_" || echo "Failed to get backend env"

      - name: Debug API responses
        run: |
          echo "========== API RESPONSES =========="
          
          # Текущая погода
          echo "=== Current weather for Saint-Petersburg ==="
          curl -s http://localhost/api/?city_name=Saint-Petersburg | jq . || echo "Failed to get current weather"
          
          # Прогноз на 3 дня
          echo -e "\n=== 3 days forecast for Saint-Petersburg ==="
          curl -s http://localhost/api/3days?city_name=Saint-Petersburg | jq . || echo "Failed to get 3 days forecast"
          
          # Прогноз на 10 дней
          echo -e "\n=== 10 days forecast for Saint-Petersburg ==="
          curl -s http://localhost/api/10days?city_name=Saint-Petersburg | jq . || echo "Failed to get 10 days forecast"

      - name: Build test image with fixed Chrome version
        run: |
          docker build \
            --build-arg CHROME_VERSION=119.0.6545.0-1 \
            -t ui_test:fixed \
            ./ui_test

      - name: Run tests with fixed Chrome
        run: |
          echo "========== RUNNING TESTS =========="
          
          docker compose -f docker-compose.ui-test.yml run \
            -e SELENIDE_TIMEOUT=90000 \
            -e SELENIDE_POLLING_INTERVAL=1000 \
            --name test-runner \
            ui_test
          
          exit_code=$?
          echo "Test exit code: $exit_code"
          
          # Копируем результаты
          docker cp test-runner:/app/target/allure-results/. ./allure-results/ || true
          docker cp test-runner:/app/build/reports/tests/. ./test-reports/ || true
          
          docker rm test-runner
          exit $exit_code

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: test-reports
          path: ./test-reports/

      - name: Copy History
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish Report
        if: always()
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-history

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.ui-test.yml down -v
          docker rmi ui_test:fixed || true