name: UI Tests with Real Backend and Allure Report

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  unit-test:
    runs-on: ubuntu-latest
    name: Unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Running unit-tests
        working-directory: ./frontend
        run: |
          npm install
          npm run test

  test:
    runs-on: ubuntu-latest
    name: UI-tests with real backend and Report
    needs: unit-test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          OW_API_KEY=${{ secrets.OW_API_KEY }}
          VC_API_KEY=${{ secrets.VC_API_KEY }}
          DB_USER=test_user
          DB_PASSWORD=test_password
          DB_NAME=test_db
          EOF
          
          echo "========== .env contents (keys hidden) =========="
          cat .env | sed 's/\(API_KEY=\)[^:]*/\1***/'
          echo "========== .env file location =========="
          pwd
          ls -la .env

      - name: Start services with Docker Compose
        run: |
          # Используем .env файл напрямую
          docker compose -f docker-compose.ui-test.yml --env-file .env up -d --build
          
          echo "Waiting for services to start..."
          timeout 60 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost)" != "200" ]]; do sleep 2; done'
          echo "Frontend is up!"
          sleep 15

      - name: Debug - check running containers
        run: |
          echo "========== RUNNING CONTAINERS =========="
          docker compose -f docker-compose.ui-test.yml ps
          
          echo "========== CHECKING PORTS =========="
          docker compose -f docker-compose.ui-test.yml port nginx 80 || echo "Nginx port not exposed"
          
          echo "========== DOCKER COMPOSE CONFIG =========="
          docker compose -f docker-compose.ui-test.yml config | grep -A 5 -B 5 "API_KEY" || echo "No API_KEY in config"

      - name: Debug backend environment
        run: |
          echo "========== BACKEND ENVIRONMENT VARIABLES =========="
          docker compose -f docker-compose.ui-test.yml exec backend env | sort | grep -E "OW_API_KEY|VC_API_KEY|DB_" || echo "Failed to get backend env"

      - name: Verify database tables
        run: |
          echo "========== VERIFYING DATABASE TABLES =========="
          
          # Проверяем, что таблицы создались
          docker compose -f docker-compose.ui-test.yml exec db psql -U weather_user -d weather_db -c "\dt" || echo "Failed to list tables"
          
          # Проверяем структуру таблицы weather_records
          docker compose -f docker-compose.ui-test.yml exec db psql -U weather_user -d weather_db -c "\d weather_records" || echo "Table weather_records does not exist"
          
          # Проверяем, есть ли данные
          docker compose -f docker-compose.ui-test.yml exec db psql -U weather_user -d weather_db -c "SELECT COUNT(*) FROM weather_records;" || echo "Cannot query weather_records"

      - name: Debug 3/10 days endpoints
        run: |
          echo "========== DEBUG 3/10 DAYS ENDPOINTS =========="
          
          # Проверяем, что бэкенд отвечает
          echo "=== Backend health check (current weather) ==="
          curl -I http://localhost/api/?city_name=Saint-Petersburg
          
          # Смотрим raw ответ для 3 days (без jq)
          echo -e "\n=== 3 days forecast - RAW RESPONSE (with headers) ==="
          curl -v http://localhost/api/3days?city_name=Saint-Petersburg 2>&1
          
          # Смотрим raw ответ для 10 days (без jq)
          echo -e "\n=== 10 days forecast - RAW RESPONSE (with headers) ==="
          curl -v http://localhost/api/10days?city_name=Saint-Petersburg 2>&1
          
          # Проверяем код ответа отдельно
          echo -e "\n=== 3 days forecast - HTTP STATUS ==="
          curl -I http://localhost/api/3days?city_name=Saint-Petersburg
          
          echo -e "\n=== 10 days forecast - HTTP STATUS ==="
          curl -I http://localhost/api/10days?city_name=Saint-Petersburg

      - name: Debug 3/10 days with redirects
        run: |
          echo "========== DEBUG 3/10 DAYS WITH REDIRECTS =========="
          
          echo "=== 3 days forecast (with redirect) ==="
          curl -L http://localhost/api/3days?city_name=Saint-Petersburg | jq . || echo "Failed to get 3 days forecast with redirect"
          
          echo -e "\n=== 10 days forecast (with redirect) ==="
          curl -L http://localhost/api/10days?city_name=Saint-Petersburg | jq . || echo "Failed to get 10 days forecast with redirect"

      - name: Debug API responses (original)
        run: |
          echo "========== API RESPONSES (ORIGINAL) =========="
          
          # Текущая погода
          echo "=== Current weather for Saint-Petersburg ==="
          curl -s http://localhost/api/?city_name=Saint-Petersburg | jq . || echo "Failed to get current weather"
          
          # Прогноз на 3 дня (пробуем с jq, но он упадет)
          echo -e "\n=== 3 days forecast (with jq - will fail) ==="
          curl -s http://localhost/api/3days?city_name=Saint-Petersburg | jq . || echo "Failed to parse 3 days forecast with jq"
          
          # Прогноз на 10 дней
          echo -e "\n=== 10 days forecast (with jq - will fail) ==="
          curl -s http://localhost/api/10days?city_name=Saint-Petersburg | jq . || echo "Failed to parse 10 days forecast with jq"
          
          # Проверка другого города
          echo -e "\n=== Current weather for Moscow ==="
          curl -s http://localhost/api/?city_name=Moscow | jq . || echo "Failed to get Moscow weather"

      - name: Debug backend logs before tests
        run: |
          echo "========== BACKEND LOGS BEFORE TESTS =========="
          docker compose -f docker-compose.ui-test.yml logs backend --tail 100

      - name: Build test image with fixed Chrome version
        run: |
          echo "========== BUILDING TEST IMAGE =========="
          docker build \
            --build-arg CHROME_VERSION=119.0.6545.0-1 \
            -t ui_test:fixed \
            ./ui_test

      - name: Run tests with fixed Chrome
        run: |
          echo "========== RUNNING TESTS =========="
          
          # Запускаем тесты через docker-compose
          docker compose -f docker-compose.ui-test.yml run \
            -e SELENIDE_TIMEOUT=90000 \
            -e SELENIDE_POLLING_INTERVAL=1000 \
            --name test-runner \
            ui_test
          
          # Сохраняем exit code
          exit_code=$?
          echo "Test exit code: $exit_code"
          
          # Показываем логи после тестов
          echo "========== BACKEND LOGS AFTER TESTS =========="
          docker compose -f docker-compose.ui-test.yml logs backend --tail 100
          
          echo "========== FRONTEND LOGS AFTER TESTS =========="
          docker compose -f docker-compose.ui-test.yml logs frontend --tail 50
          
          # Копируем результаты
          docker cp test-runner:/app/target/allure-results/. ./allure-results/ || true
          docker cp test-runner:/app/build/reports/tests/. ./test-reports/ || true
          
          # Удаляем контейнер
          docker rm test-runner
          
          exit $exit_code

      - name: Collect logs on failure
        if: failure()
        run: |
          echo "========== COLLECTING ALL LOGS =========="
          docker compose -f docker-compose.ui-test.yml logs > docker-logs.txt
          docker compose -f docker-compose.ui-test.yml exec nginx cat /var/log/nginx/error.log || true
          docker compose -f docker-compose.ui-test.yml logs backend --tail 200 >> docker-logs.txt
          
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ./test-reports/
          retention-days: 7

      - name: Copy History
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish Report
        if: always()
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-history

      - name: Cleanup
        if: always()
        run: |
          echo "========== CLEANING UP =========="
          docker compose -f docker-compose.ui-test.yml down -v
          docker rmi ui_test:fixed || true