name: UI Tests with Real Backend and Allure Report

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  unit-test:
    runs-on: ubuntu-latest
    name: Unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Running unit-tests
        working-directory: ./frontend
        run: |
          npm install
          npm run test

  test:
    runs-on: ubuntu-latest
    name: UI-tests with real backend and Report
    needs: unit-test
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test .env file
        run: |
          cat > .env.test << EOF
          OW_API_KEY=${{ secrets.OW_API_KEY }}
          VC_API_KEY=${{ secrets.VC_API_KEY }}
          DB_USER=test_user
          DB_PASSWORD=test_password
          DB_NAME=test_db
          EOF

      - name: Start services with Docker Compose
        run: |
          docker-compose -f docker-compose.ui-test.yml --env-file .env.test up -d --build
          echo "Waiting for services to start..."
          sleep 30
          curl --retry 10 --retry-delay 5 --retry-all-errors http://localhost:80 || \
          docker-compose -f docker-compose.ui-test.yml logs nginx frontend

      - name: Wait for tests to complete
        run: |
          docker wait $(docker-compose -f docker-compose.ui-test.yml ps -q ui_test)
          docker-compose -f docker-compose.ui-test.yml logs ui_test

      - name: Copy test results
        if: always()
        run: |
          mkdir -p allure-results
          docker cp $(docker-compose -f docker-compose.ui-test.yml ps -q ui_test):/app/target/allure-results/. ./allure-results/ || true

      - name: Collect logs on failure
        if: failure()
        run: |
          docker-compose -f docker-compose.ui-test.yml logs > docker-logs.txt
      - uses: actions/upload-artifact@v4  # ИСПРАВЛЕНО: v3 -> v4
        if: failure()
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Copy History
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish Report
        if: always()
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-history

      - name: Cleanup
        if: always()
        run: |
          docker-compose -f docker-compose.ui-test.yml down -v