name: UI Tests with Real Backend and Allure Report

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  unit-test:
    runs-on: ubuntu-latest
    name: Unit-tests
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Running unit-tests
        working-directory: ./frontend
        run: |
          npm install
          npm run test

  test:
    runs-on: ubuntu-latest
    name: UI-tests with real backend and Report
    needs: unit-test
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create test .env file
        run: |
          cat > .env.test << EOF
          OW_API_KEY=${{ secrets.OW_API_KEY }}
          VC_API_KEY=${{ secrets.VC_API_KEY }}
          DB_USER=test_user
          DB_PASSWORD=test_password
          DB_NAME=test_db
          EOF

      - name: Start services with Docker Compose
        run: |
          docker compose -f docker-compose.ui-test.yml --env-file .env.test up -d --build
          echo "Waiting for services to start..."
          
          # Проверяем, что фронтенд отвечает
          timeout 60 bash -c 'while [[ "$(curl -s -o /dev/null -w ''%{http_code}'' http://localhost)" != "200" ]]; do sleep 2; done'
          echo "Frontend is up!"
          
          # Дополнительное время для инициализации React
          sleep 15

      - name: Build test image with fixed Chrome version
        run: |
          # Собираем образ тестов с фиксированной версией Chrome 119
          docker build \
            --build-arg CHROME_VERSION=119.0.6545.0-1 \
            -t ui_test:fixed \
            ./ui_test

      - name: Run tests with fixed Chrome
        run: |
          # Запускаем тесты через docker-compose, чтобы использовать ту же сеть
          docker compose -f docker-compose.ui-test.yml run \
            -e SELENIDE_TIMEOUT=60000 \
            -e SELENIDE_POLLING_INTERVAL=500 \
            --name test-runner \
            ui_test
          
          # Получаем exit code тестов
          exit_code=$(docker inspect test-runner --format='{{.State.ExitCode}}')
          echo "Test exit code: $exit_code"
          
          # Копируем результаты
          docker cp test-runner:/app/target/allure-results/. ./allure-results/ || true
          docker cp test-runner:/app/build/reports/tests/. ./test-reports/ || true
          
          # Удаляем контейнер
          docker rm test-runner
          
          # Выходим с кодом тестов
          exit $exit_code

      - name: Collect logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.ui-test.yml logs > docker-logs.txt
          docker compose -f docker-compose.ui-test.yml exec nginx cat /var/log/nginx/error.log || true
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: docker-logs
          path: docker-logs.txt

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: ./test-reports/
          retention-days: 7

      - name: Copy History
        uses: actions/checkout@v4
        if: always()
        with:
          ref: gh-pages
          path: gh-pages

      - name: Build Report
        uses: simple-elf/allure-report-action@master
        if: always()
        with:
          allure_results: allure-results
          allure_history: allure-history
          gh_pages: gh-pages
          keep_reports: 20

      - name: Publish Report
        if: always()
        uses: peaceiris/actions-gh-pages@v2
        env:
          PERSONAL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PUBLISH_BRANCH: gh-pages
          PUBLISH_DIR: allure-history

      - name: Cleanup
        if: always()
        run: |
          docker compose -f docker-compose.ui-test.yml down -v
          docker rmi ui_test:fixed || true